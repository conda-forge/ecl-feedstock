{% set version = "26.5.5" %}
{% set name = "ecl" %}

package:
  name: {{ name }}
  version: {{ version }}

source:
  url: https://common-lisp.net/project/ecl/static/files/release/{{ name }}-{{ version }}.tgz
  sha256: a01a5bcda8c5b73e59dda3494fd13e5fec5db6aa1dad782c3cc3bb57f1633435
  patches:
    # from https://github.com/sagemath/sage/blob/master/build/pkgs/ecl/patches/write_error.patch
    - write_error.patch
    - fix-prefix.patch
    # Backport of https://gitlab.com/embeddable-common-lisp/ecl/-/commit/59de50b52380132d44bfa05f573544cba0a8c65f
    # so that (require :<module>) finds third-party modules (e.g. maxima.fas)
    # in the directories listed in ECL_SIDE_MODULES_PATH (see build.sh).
    # Remove with the next upstream release, which includes this file.
    - side-modules.patch

build:
  number: 0
  ignore_run_exports:
    # libatomic_ops in host is only needed for its headers at build time
    # (--enable-libatomic=system); ecl does not link against it, so its
    # run_export would add a spurious runtime dependency.
    - libatomic_ops  # [unix]

requirements:
  build:
    - gnuconfig  # [unix]
    - {{ compiler('c') }}
    - {{ stdlib('c') }}
    - libtool  # [unix]
    - make  # [unix]
    - texinfo  # [unix]
    - sed  # [unix]
    - cmake  # [win]
    # We (typically) need a compatible version of ecl when cross-compiling ecl.
    # On a major upgrade, this cannot be satisfied. When this fails, we merge
    # the PR that builds the native ecl and then restart the CI once the native
    # versions are uploaded.
    - ecl 26.*  # [build_platform != target_platform]
  host:
    - gmp
    - readline  # [unix]
    - bdw-gc  # [unix]
    - libatomic_ops  # [unix]
    - libffi  # [unix]
  run:
    - gmp
    - readline  # [unix]
    - {{ pin_compatible('bdw-gc') }}  # [unix]

test:
  commands:
    - if not exist %PREFIX%\{{ name }}.exe exit 1  # [win]
    - if not exist %PREFIX%\{{ name }}\{{ name }}.h exit 1  # [win]
    - if not exist %PREFIX%\{{ name }}.lib exit 1  # [win]
    - test -f ${PREFIX}/include/{{ name }}/{{ name }}.h  # [unix]
    - test -f ${PREFIX}/lib/lib{{ name }}.dylib  # [osx]
    - test -f ${PREFIX}/lib/lib{{ name }}.so     # [linux]
    - ecl --eval "(assert (member :boehm-gc *features*))" --eval "(assert (member :dffi *features*))" --eval "(quit)"  # [unix]
    # verify that the side-modules search path baked in at build time (see
    # side-modules.patch) survived conda's prefix relocation
    - ecl --eval "(assert (equal si::*build-time-side-module-pathnames* (list (parse-namestring \"$PREFIX/lib/ecl-{{ version }}/\"))))" --eval "(quit)"  # [unix]
    # verify that (require :<module>) finds modules via ECL_SIDE_MODULES_PATH
    - echo '(provide "SIDE-MODULES-TEST")' > side-modules-test.lsp  # [unix]
    - ECL_SIDE_MODULES_PATH=$PWD ecl --eval "(require :side-modules-test)" --eval "(assert (member \"SIDE-MODULES-TEST\" *modules* :test (function string=)))" --eval "(quit)"  # [unix]
    - ecl --version

about:
  home: https://common-lisp.net/project/ecl
  license: GPL-2.0-or-later
  license_file: COPYING
  summary: ECL (Embeddable Common-Lisp) is an interpreter of the Common-Lisp language.
  doc_url: https://common-lisp.net/project/ecl/static/ecldoc/
  dev_url: https://gitlab.com/embeddable-common-lisp/ecl

extra:
  recipe-maintainers:
    - isuruf
    - embray
    - saraedum
